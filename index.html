<!DOCTYPE html>
<html lang="en" data-theme="dark" class="h-full bg-[#0a0a0a] text-[#e0e0e0] font-mono">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Management CLI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    fontFamily: {
                        mono: ["JetBrains Mono", "Fira Code", "Consolas", "monospace"]
                    },
                    colors: {
                        terminal: {
                            50: "#f0fdf4",
                            100: "#dcfce7",
                            200: "#bbf7d0",
                            300: "#86efac",
                            400: "#4ade80",
                            500: "#22c55e",
                            600: "#16a34a",
                            700: "#15803d",
                            800: "#166534",
                            900: "#14532d"
                        },
                        code: {
                            comment: "#6b7280",
                            keyword: "#818cf8",
                            string: "#4ade80",
                            function: "#60a5fa",
                            operator: "#fbbf24"
                        }
                    },
                    animation: {
                        "cursor-blink": "blink 1s infinite"
                    },
                    keyframes: {
                        blink: { "0%, 100%": { opacity: "1" }, "50%": { opacity: "0" } }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/style.css?v=1.0.1">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="h-full bg-[#0a0a0a] text-[#e0e0e0] font-mono overflow-hidden">

    <div id="terminalContainer" class="h-full flex flex-col">
<header class="bg-[#111111] border-b border-[#333] px-4 py-2 flex items-center justify-between relative overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-r from-[#22c55e]/5 to-transparent"></div>
            <div class="flex items-center gap-2 z-10">
                <div class="w-5 h-5 rounded-sm bg-[#22c55e] flex items-center justify-center shadow-lg shadow-[#22c55e]/30">
                    <svg class="w-3.5 h-3.5 text-black" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                    </svg>
            </div>
            <span class="text-sm font-semibold">store-manager@dev:~</span>
        </div>
            <div class="flex items-center gap-4 text-xs z-10">
                <span class="text-[#6b7280]">user@</span>
                <div class="flex items-center gap-1.5">
                    <div class="w-1.5 h-1.5 rounded-full bg-[#fbbf24]"></div>
                    <span id="currentUser" class="text-[#fbbf24] font-medium">admin</span>
                </div>
                <span id="userRole" class="px-2 py-0.5 bg-[#1e40af] rounded text-xs font-medium">admin</span>
                <button id="logoutBtn" class="w-7 h-7 rounded-full hover:bg-[#222] flex items-center justify-center transition-all duration-300" title="Sign out of your account">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 18h6"/>
                        <path d="M10 22h4"/>
                        <polyline points="12 15 17 10 12 5"/>
                    </svg>
                </button>
                <button id="themeToggle" class="w-7 h-7 rounded-full hover:bg-[#222] flex items-center justify-center transition-all duration-300" title="Toggle between dark and light theme">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path class="sun-icon" d="M12 3v1m0 16v1m9-9h-1M4 12h1m5.6 5.6 1.4-1.4m12.8-1.4-1.4 1.4M6 6l1.4 1.4m14.8 0L18 6m-2-2v1"/>
                    </svg>
                </button>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <aside class="w-80 bg-[#111111] border-r border-[#333] p-4 overflow-y-auto">
<div class="mb-6">
                    <div class="text-xs text-[#6b7280] mb-2 flex items-center gap-1.5">
                        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M11 19H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2z"/>
                            <polyline points="15 17 19 13 15 9"/>
                        </svg>
                        [TASK_INPUT]
                    </div>
                    <form id="taskForm" class="space-y-3">
                        <div>
                            <label class="text-xs text-[#818cf8] flex items-center gap-1">
                                <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                    <polyline points="7 10 12 15 17 10"/>
                                </svg>
                                // task description
                            </label>
                            <div class="relative mt-1">
                                <input type="text" id="taskInput" placeholder="Enter task..." title="Enter a short description of the task you want to add" class="w-full bg-[#1a1a1a] border border-[#333] rounded-lg px-3 py-2 text-sm font-mono focus:border-[#22c55e] outline-none transition-all duration-300 peer">
                                <div class="absolute inset-0 rounded-lg bg-gradient-to-r from-[#22c55e]/5 to-transparent opacity-0 peer-focus:opacity-100 transition-opacity duration-300"></div>
                            </div>
                            <p id="errorMsg" class="text-[#ef4444] text-xs mt-1 h-4 transition-all duration-200"></p>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="text-xs text-[#fbbf24] flex items-center gap-1">
                                    <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <line x1="3" y1="12" x2="21" y2="12"/>
                                        <polyline points="3 12 12 5 21 12"/>
                                    </svg>
                                    priority
                                </label>
                                <select id="taskPriority" title="Select the priority level for this task" class="w-full bg-[#1a1a1a] border border-[#333] rounded-lg px-2 py-1 text-xs transition-all duration-300 focus:border-[#fbbf24]">
                                    <option value="low">low</option>
                                    <option value="medium" selected>medium</option>
                                    <option value="high">high</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-xs text-[#60a5fa] flex items-center gap-1">
                                    <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                                        <line x1="16" y1="2" x2="16" y2="6"/>
                                        <line x1="8" y1="2" x2="8" y2="6"/>
                                        <line x1="3" y1="10" x2="21" y2="10"/>
                                    </svg>
                                    due_date
                                </label>
                                <input type="date" id="taskDueDate" title="Optional: Set a due date for this task" class="w-full bg-[#1a1a1a] border border-[#333] rounded-lg px-2 py-1 text-xs transition-all duration-300 focus:border-[#60a5fa]">
                            </div>
                        </div>
                        <button type="submit" title="Add the new task to your list" class="w-full bg-gradient-to-r from-[#22c55e] to-[#16a34a] hover:from-[#16a34a] hover:to-[#15803d] text-black font-bold py-2 rounded-lg text-xs transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98]">
                            <span class="flex items-center justify-center gap-1.5">
                                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="12" y1="5" x2="12" y2="19"/>
                                    <line x1="5" y1="12" x2="19" y2="12"/>
                                </svg>
                                // add task
                            </span>
                        </button>
                    </form>
                </div>

<div>
                    <div class="text-xs text-[#6b7280] mb-2 flex items-center gap-1.5">
                        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 3v18h18"/>
                            <path d="M18 17V9"/>
                            <path d="M13 17V5"/>
                            <path d="M8 17v-3"/>
                        </svg>
                        [ANALYTICS]
                    </div>
                    <div class="space-y-2 font-mono text-xs">
                        <div title="Total number of tasks in your list" class="flex justify-between items-center p-2 rounded bg-[#1a1a1a]/50 transition-all duration-300 hover:bg-[#1a1a1a]">
                            <span class="text-[#6b7280] flex items-center gap-1">
                                <svg class="w-3.5 h-3.5 text-[#22c55e]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"/>
                                    <path d="M12 6v6l4 2"/>
                                </svg>
                                total:
                            </span>
                            <span id="totalTasks" class="text-white font-mono bg-[#222] px-2 py-0.5 rounded">0</span>
                        </div>
                        <div title="Tasks that are still pending" class="flex justify-between items-center p-2 rounded bg-[#1a1a1a]/50 transition-all duration-300 hover:bg-[#1a1a1a]">
                            <span class="text-[#6b7280] flex items-center gap-1">
                                <svg class="w-3.5 h-3.5 text-[#fbbf24]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"/>
                                    <polyline points="12 6 12 12 16 14"/>
                                </svg>
                                active:
                            </span>
                            <span id="activeTasks" class="text-[#fbbf24] font-mono bg-[#1a1a1a] px-2 py-0.5 rounded">0</span>
                        </div>
                        <div title="Tasks you have already completed" class="flex justify-between items-center p-2 rounded bg-[#1a1a1a]/50 transition-all duration-300 hover:bg-[#1a1a1a]">
                            <span class="text-[#6b7280] flex items-center gap-1">
                                <svg class="w-3.5 h-3.5 text-[#22c55e]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                                    <polyline points="22 4 22 11 15 11"/>
                                </svg>
                                done:
                            </span>
                            <span id="completedTasks" class="text-[#22c55e] font-mono bg-[#166534]/30 px-2 py-0.5 rounded">0</span>
                        </div>
                    </div>
                </div>

<div class="mt-6 pt-4 border-t border-[#222]">
                    <div class="text-xs text-[#6b7280] mb-2 flex items-center gap-1.5">
                        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2v20M5 12h14M4 4l4 4M20 4l-4 4"/>
                        </svg>
                        [ACTIONS]
                    </div>
                    <div class="space-y-1">
                        <button id="backupData" title="Download all your tasks as a JSON backup file" class="w-full text-left px-3 py-1.5 text-xs hover:bg-gradient-to-r hover:from-[#22c55e]/10 hover:to-transparent rounded transition-all duration-300 flex items-center gap-2 group" data-role-admin>
                            <svg class="w-4 h-4 text-[#22c55e] group-hover:scale-110 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="7 10 12 15 17 10"/>
                                <line x1="12" y1="15" x2="12" y2="3"/>
                            </svg>
                            <span>export.json</span>
                        </button>
                        <button id="clearCompleted" title="Permanently remove all completed tasks from the list" class="w-full text-left px-3 py-1.5 text-xs hover:bg-gradient-to-r hover:from-[#ef4444]/10 hover:to-transparent rounded transition-all duration-300 flex items-center gap-2 group">
                            <svg class="w-4 h-4 text-[#ef4444] group-hover:scale-110 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6h18"/>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/>
                                <line x1="8" y1="6" x2="8" y2="2"/>
                                <line x1="16" y1="6" x2="16" y2="2"/>
                            </svg>
                            <span>clear.completed</span>
                        </button>
                        <!-- Logout button in sidebar -->
                        <button id="sidebarLogoutBtn" title="Sign out and return to the login screen" class="w-full text-left px-3 py-1.5 text-xs hover:bg-gradient-to-r hover:from-[#ef4444]/10 hover:to-transparent rounded transition-all duration-300 flex items-center gap-2 group text-[#ef4444]">
                            <svg class="w-4 h-4 text-[#ef4444] group-hover:scale-110 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                                <polyline points="16 17 21 12 16 7"/>
                                <line x1="21" y1="12" x2="9" y2="12"/>
                            </svg>
                            <span>logout</span>
                        </button>
                    </div>
                </div>
            </aside>

            <main class="flex-1 flex flex-col">
<div class="bg-[#111111] border-b border-[#333] px-4 py-2 flex items-center justify-between relative overflow-hidden">
                    <div class="absolute inset-0 bg-gradient-to-l from-[#22c55e]/5 to-transparent"></div>
                    <div class="flex items-center gap-4 z-10">
                        <div class="text-xs flex items-center gap-1.5">
                            <svg class="w-3.5 h-3.5 text-[#6b7280]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 6h18"/>
                                <path d="M7 12h14"/>
                                <path d="M11 18h8"/>
                            </svg>
                            <span class="text-[#6b7280]">filter:</span>
                            <span class="ml-2 text-white font-medium">all</span>
                        </div>
                        <div class="text-xs flex items-center gap-1.5">
                            <svg class="w-3.5 h-3.5 text-[#6b7280]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"/>
                                <line x1="21" y1="21" x2="13" y2="13"/>
                            </svg>
                            <span class="text-[#6b7280]">search:</span>
                            <input type="text" id="searchBar" placeholder="query..." class="ml-2 bg-transparent border-b border-[#333] text-xs outline-none w-48 focus:border-[#22c55e] transition-colors duration-300">
                        </div>
                    </div>
                    <div class="flex gap-2 z-10">
                        <button class="filter-btn px-3 py-1.5 text-xs bg-gradient-to-r from-[#22c55e] to-[#16a34a] text-black rounded-md font-medium shadow-lg shadow-[#22c55e]/20 transform scale-105" data-filter="all">
                            <svg class="w-3.5 h-3.5 inline mr-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                                <polyline points="22 4 22 11 15 11"/>
                            </svg>
                            all
                        </button>
                        <button class="filter-btn px-3 py-1.5 text-xs bg-[#222] rounded-md hover:bg-[#22c55e]/20 transition-all duration-300" data-filter="active">
                            <svg class="w-3.5 h-3.5 inline mr-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                            </svg>
                            active
                        </button>
                        <button class="filter-btn px-3 py-1.5 text-xs bg-[#222] rounded-md hover:bg-[#22c55e]/20 transition-all duration-300" data-filter="completed">
                            <svg class="w-3.5 h-3.5 inline mr-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 6L9 17l-5-5"/>
                            </svg>
                            done
                        </button>
                    </div>
                </div>

<div class="flex-1 overflow-y-auto p-4">
                    <ul id="taskList" class="space-y-1 font-mono text-sm">
                        <li class="text-[#6b7280] text-xs py-8 text-center animate-fade-in">
                            <div class="flex flex-col items-center gap-3">
                                <div class="w-12 h-12 rounded-full bg-[#22c55e]/10 flex items-center justify-center">
                                    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                        <polyline points="14 2 14 8 20 8"/>
                                    </svg>
                                </div>
                                <span>> no tasks found</span>
                            </div>
                        </li>
                    </ul>
                </div>

<div class="bg-[#111111] border-t border-[#333] px-4 py-2 text-xs text-[#6b7280] flex items-center justify-between relative overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-l from-[#22c55e]/5 to-transparent"></div>
            <div class="flex items-center gap-3 z-10">
                <div class="flex items-center gap-1">
                    <div class="w-1.5 h-1.5 rounded-full bg-[#22c55e] animate-pulse"></div>
                    <span>ready</span>
                </div>
                <span>|</span>
                <span>Alt+N: focus | Drag: reorder | Click: edit</span>
            </div>
            <div class="flex items-center gap-2 z-10">
                <span id="currentDate" class="text-[#6b7280]"></span>
                <span>|</span>
                <span id="currentTime" class="font-mono text-[#fbbf24]"></span>
            </div>
        </div>
            </main>
        </div>
    </div>

<div id="authOverlay">
        <div id="authCard" style="opacity: 0; transform: scale(0.95);">
            <div class="text-center mb-6 animate-fade-in-up">
                <div class="w-16 h-16 rounded-full bg-gradient-to-r from-[#22c55e] to-[#16a34a] flex items-center justify-center mx-auto mb-3 shadow-lg shadow-[#22c55e]/30 animate-scale-up">
                    <svg class="w-8 h-8 text-black" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <circle cx="12" cy="16" r="1"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                </div>
                <div class="text-sm text-[#6b7280]">Store Management System</div>
            </div>
            <form id="loginForm" class="space-y-4">
                <div class="animate-fade-in-up" style="animation-delay: 0.1s">
                    <label class="text-xs text-[#818cf8] flex items-center gap-1">
                        <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        username
                    </label>
                    <div class="relative mt-1">
                        <input type="text" id="loginUsername" class="w-full bg-[#1a1a1a] border border-[#333] rounded-lg px-3 py-2 text-sm transition-all duration-300 focus:border-[#818cf8]" placeholder="Enter username..." autocomplete="username" tabindex="0">
                        <div class="absolute inset-0 rounded-lg bg-gradient-to-r from-[#818cf8]/5 to-transparent opacity-0 focus:opacity-100 transition-opacity duration-300 pointer-events-none"></div>
                    </div>
                </div>
                <div class="animate-fade-in-up" style="animation-delay: 0.2s">
                    <label class="text-xs text-[#fbbf24] flex items-center gap-1">
                        <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <circle cx="12" cy="16" r="1"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        password
                    </label>
                    <div class="relative mt-1">
                        <input type="password" id="loginPassword" class="w-full bg-[#1a1a1a] border border-[#333] rounded-lg px-3 py-2 text-sm transition-all duration-300 focus:border-[#fbbf24]" placeholder="Enter password..." autocomplete="current-password" tabindex="0">
                        <div class="absolute inset-0 rounded-lg bg-gradient-to-r from-[#fbbf24]/5 to-transparent opacity-0 focus:opacity-100 transition-opacity duration-300 pointer-events-none"></div>
                    </div>
                </div>
                <div class="animate-fade-in-up" style="animation-delay: 0.25s">
                    <label class="text-xs text-[#60a5fa] flex items-center gap-1">
                        <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2v20M5 12h14M4 4l4 4M20 4l-4 4"/>
                        </svg>
                        role
                    </label>
                    <select id="loginRole" class="w-full bg-[#1a1a1a] border border-[#333] rounded-lg px-3 py-2 text-sm transition-all duration-300 focus:border-[#60a5fa]">
                        <option value="admin">admin</option>
                        <option value="clerk">clerk</option>
                        <option value="cashier">cashier</option>
                    </select>
                </div>
                <p id="loginError" class="text-[#ef4444] text-xs hidden transition-all duration-200 animate-fade-in-up" style="animation-delay: 0.3s"></p>
                <button type="submit" class="w-full bg-gradient-to-r from-[#22c55e] to-[#16a34a] hover:from-[#16a34a] hover:to-[#15803d] text-black font-bold py-2.5 rounded-lg transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98] animate-fade-in-up" style="animation-delay: 0.4s">
                    login
                </button>
            </form>
            <!-- Single Register Button -->
            <div id="authActions" class="mt-4 pt-4 border-t border-[#333]">
                <button id="showRegisterBtn"
                        class="w-full bg-[#1a1a1a] hover:bg-[#222] border border-[#333] hover:border-[#818cf8] text-[#818cf8] font-medium py-2.5 rounded-lg text-xs transition-all duration-300">
                    Register new account
                </button>
            </div>

            <!-- Registration Form (shown when Register button is clicked) -->
            <form id="registerForm" class="hidden space-y-4 mt-4">
                <div class="text-center">
                    <div class="text-sm text-[#6b7280]">Create new account</div>
                </div>

                <div>
                    <label class="text-xs text-[#818cf8] flex items-center gap-1">
                        <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        username
                    </label>
                    <input type="text" id="regUsername" 
                           class="w-full bg-[#1a1a1a] border border-[#333] rounded-lg px-3 py-2 text-sm focus:border-[#818cf8] outline-none" 
                           placeholder="Choose a username..." autocomplete="username">
                </div>

                <div>
                    <label class="text-xs text-[#fbbf24] flex items-center gap-1">
                        <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <circle cx="12" cy="16" r="1"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        password
                    </label>
                    <input type="password" id="regPassword" 
                           class="w-full bg-[#1a1a1a] border border-[#333] rounded-lg px-3 py-2 text-sm focus:border-[#fbbf24] outline-none" 
                           placeholder="Create a password..." autocomplete="new-password">
                </div>

                <div>
                    <label class="text-xs text-[#60a5fa] flex items-center gap-1">
                        <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2v20M5 12h14M4 4l4 4M20 4l-4 4"/>
                        </svg>
                        role
                    </label>
                    <select id="regRole" class="w-full bg-[#1a1a1a] border border-[#333] rounded-lg px-3 py-2 text-sm focus:border-[#60a5fa]">
                        <option value="clerk">clerk</option>
                        <option value="cashier">cashier</option>
                        <option value="admin">admin</option>
                    </select>
                </div>

                <p id="registerError" class="text-[#ef4444] text-xs hidden"></p>
                <p id="registerSuccess" class="text-[#22c55e] text-xs hidden"></p>

                <div class="flex gap-2">
                    <button type="button" id="backToLoginBtn"
                            class="flex-1 bg-[#222] hover:bg-[#333] text-[#e0e0e0] py-2 rounded-lg text-xs transition-colors">
                        Back to login
                    </button>
                    <button type="submit"
                            class="flex-1 bg-gradient-to-r from-[#22c55e] to-[#16a34a] hover:from-[#16a34a] hover:to-[#15803d] text-black font-bold py-2 rounded-lg text-xs transition-all">
                        Register
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/ui.js?v=1.0.1"></script>

</body>
